name: Create OCI Instance
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress

      - name: Write private key
        env:
          KEY: ${{ secrets.OCI_KEY_FILE_CONTENT }}
        run: |
          echo "$KEY" > /tmp/oci.pem
          chmod 600 /tmp/oci.pem
          echo "Lines in key file: $(wc -l < /tmp/oci.pem)"
          head -1 /tmp/oci.pem

      - name: Run instance creation
        run: php index.php
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /tmp/oci.pem
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: 2
          OCI_MEMORY_IN_GBS: 12
          OCI_SHAPE: VM.Standard.A1.Flex
          OCI_MAX_INSTANCES: 1
          OCI_AVAILABILITY_DOMAIN: ""
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
